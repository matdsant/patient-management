server:
  port: 4004 # Gateway listens on port 4004

auth:
  service:
    url: http://auth-service:4005

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service-route
          uri: http://auth-service:4005
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        # Route for /api/patients/** to patient-service
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        # Route for /api/docs/patients to patient-service /v3/api-docs
        - id: api-docs-patient-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients,/v3/api-docs

        - id: api-docs-auth-route
          uri: http://auth-service:4005
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth,/v3/api-docs

        # Proxy do Swagger UI do patient-service, para acesso sem expor a porta 4000 no host
        - id: swagger-ui-patients-route
          uri: http://patient-service:4000
          predicates:
            - Path=/swagger-ui/patients/**
          filters:
            - RewritePath=/swagger-ui/patients/(?<segment>.*),/swagger-ui/${segment}

        # O bundle do Swagger UI busca o spec (e /v3/api-docs/swagger-config) em um
        # caminho absoluto fixo, por isso essa rota complementa a acima (sem StripPrefix)
        - id: api-docs-raw-patients-route
          uri: http://patient-service:4000
          predicates:
            - Path=/v3/api-docs/**
